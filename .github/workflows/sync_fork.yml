name: sync-fork
on:
  schedule:
    - cron: '0 5 * * MON'
  workflow_dispatch: { }
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      run_build: ${{ steps.edit_n_push.outputs.run_build }}
    steps:
      # - run: gh repo sync $REPOSITORY -b $BRANCH_NAME
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     # REPOSITORY: ${{ github.repository }}
      #     # BRANCH_NAME: ${{ github.ref_name }}
      #     REPOSITORY: coredns/coredns
      #     BRANCH_NAME: master

      # - name: Checkout repository
      #   uses: actions/checkout@v2.3.2

      # - name: pull the latest code
      #   run: git pull
      # - name: edit plugin.cfg and push
      #   id: edit_n_push
      #   run: |
      #     if ! grep -q mysql plugin.cfg; then
      #       echo "mysql:github.com/cloud66-oss/coredns_mysql" >> plugin.cfg
      #     fi

      #     if [[ `git status --porcelain` ]]; then
      #       git add .
      #       git config user.email "marcofontana.ing@gmail.com"
      #       git config user.name "MaxwellJK"
      #       git commit -m "Auto adding mysql to plugin.cfg"
      #       git fetch origin master
      #       git push origin HEAD:master
      #       echo "run_build='false'" >> $GITHUB_OUTPUT
      #     else
      #       echo "run_build='true'" >> $GITHUB_OUTPUT
      #     fi
      - uses: actions/checkout@v2
      - name: Merge upstream
        run: |
         git config user.name "MaxwellJK"
         git config user.email "marcofontana.ing@gmail.com"

         # "git checkout master" is unnecessary, already here by default
         git pull --unshallow  # this option is very important, you would get
                                # complains about unrelated histories without it.
                                # (but actions/checkout@v2 can also be instructed
                                # to fetch all git depth right from the start)

         git remote add upstream https://github.com/coredns/coredns.git
         git fetch upstream
         git checkout main
         git rebase upstream/master

      - name: edit plugin.cfg and push
        id: edit_n_push
        run: |
          if ! grep -q mysql plugin.cfg; then
            echo "mysql:github.com/cloud66-oss/coredns_mysql" >> plugin.cfg
          fi

          if [[ `git status --porcelain` ]]; then
            git add .
            git config user.email "marcofontana.ing@gmail.com"
            git config user.name "MaxwellJK"
            git commit -m "Auto adding mysql to plugin.cfg"
            git fetch origin master
            git push origin HEAD:master
            echo "run_build='false'" >> $GITHUB_OUTPUT
          else
            echo "run_build='true'" >> $GITHUB_OUTPUT
          fi
         
  build:
    needs: sync
    if: ${{needs.sync.outputs.run_build}} == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout repository
        uses: actions/checkout@v2.3.2

      - name: Build coredns
        run: |
          ls
          cd coredns
          make

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - uses: actions/checkout@v4
    
      - name: Unix timestamp tag
        id: unixts
        run: |
          ts=$(date +%s)
          echo "Export variables"
          echo "tag_ts=$ts" >> $GITHUB_OUTPUT
  
      - name: Login to GHCR 
        uses: docker/login-action@v1  
        with: 
          registry: ghcr.io 
          username: maxwelljk
          password: ${{ secrets.CR_PAT }}
  
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/maxwelljk/coredns:${{ steps.unixts.outputs.tag_ts }}, ghcr.io/maxwelljk/coredns:latest
