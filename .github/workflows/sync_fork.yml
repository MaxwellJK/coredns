name: sync-fork
on:
  schedule:
    - cron: '0 5 * * MON'
  workflow_dispatch: { }
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: gh repo sync $REPOSITORY -b $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}

      - name: Checkout repository
        uses: actions/checkout@v2.3.2
        
      - name: edit plugin.cfg
        run: echo "mysql:github.com/cloud66-oss/coredns_mysql" >> plugin.cfg
      - name: check for changes
        run: git status
      - name: stage changed files
        run: git add .
      - name: commit changed files
        run: |
          git config user.email "marcofontana.ing@gmail.com"
          git config user.name "MaxwellJK"
          git commit -m "Auto adding mysql to plugin.cfg"
      - name: fetch from master
        run: git fetch origin master
      - name: push code to master
        run: git push origin HEAD:master



      - name: Unix timestamp tag
        id: unixts
        run: |
          ts=$(date +%s)
          echo "Export variables"
          echo "tag_ts=$ts" >> $GITHUB_OUTPUT
  
      - name: Login to GHCR 
        uses: docker/login-action@v1  
        with: 
          registry: ghcr.io 
          username: maxwelljk
          password: ${{ secrets.CR_PAT }}
  
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/maxwelljk/coredns:${{ steps.unixts.outputs.tag_ts }}, ghcr.io/maxwelljk/coredns:latest
